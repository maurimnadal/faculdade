<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Escola</title>
</head>
<style>
    h1 {
        text-align: center;
    }

    h2 {
        text-align: center;
    }

    input.pequeno {
        max-width: 4%;
    }

    .médio {
        max-width: 10%;
    }

    p {
        font-weight: bold;
    }

    .turno {
        font-weight: normal;
    }
</style>

<body>

    <h1>Escola Virtual</h1>
    <h2>Formulário de Pré-Matrícula</h2>
    <hr>
    <form action="submit.php" method="post">
        <table>
            <hr border="1">

            <p>Dados Pessoais:</p>
            <label for="name">Nome do Aluno:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="nasc">Nascimento (dd/mm/aaaa):</label>
            <input class="pequeno" type="number" id="nasc" name="nasc" required>/
            <input class="pequeno" type="number" id="nasc" name="nasc" required>/
            <input class="pequeno" type="number" id="nasc" name="nasc" required><br><br>
            <label for="mom-name">Nome da Mãe:</label>
            <input type="text" id="mom-name" name="mom-name" required><br><br>
            <label for="dad-name">Nome do pai</label>
            <input type="text" id="dad-name" name="dad-name" required><br><br>
            <label for="phone">Telefone: DDD</label>
            (<input class="pequeno" type="number" required>)
            <label for="phone-number">Tel:</label>
            <input class="médio" type="number" id="phone-number" name="phone-number" required>
            <label for="ramal">Ramal:</label>
            <input class="pequeno" type="text" id="ramal" name="ramal" required><br><br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <hr>
        </table>
        <table border="1">
            <hr>
            <p>Informações de Matrícula</p>
            <label for="serie">Série:</label>
            <select name="serie" id="serie" required>
                <option value="">Selecione uma opção</option>
                <option value="pre-escolar">Pré-escolar</option>
                <option value="fundamental">Ensino Fundamental</option>
                <option value="fundamental2">Ensino Fundamental II</option>
                <option value="medio">Ensino Médio</option>
                <option value="superior">Ensino Superior</option>
            </select>
            <br>
            <p class="turno">Turno:</p>
            <input type="radio" id="manha" name="turno" value="Manhã">
            <label for="manha">Manhã</label><br>
            <input type="radio" id="tarde" name="turno" value="Tarde">
            <label for="tarde">Tarde</label><br><br>
            <label for="ativ-extra">Atividades Extracurriculares:</label><br>
            <input type="checkbox" name="info" id="info">
            <label for="info">Informática</label><br>
            <input type="checkbox" name="musica" id="musica">
            <label for="musica">Música</label><BR>
            <input type="checkbox" name="balet" id="balet">
            <label for="musica">Música</label><BR>
            <input type="checkbox" name="pintura" id="pintura">
            <label for="pintura">Pintura</label><BR>
            <input type="checkbox" name="judo" id="judo">
            <label for="judo">Judô</label><BR>
            <input type="checkbox" name="fut" id="fut">
            <label for="fut">Futebol</label><BR>
            <hr>
            <input type="submit" value="Enviar Formulário">
            <input type="reset" value="Limpar Dados">


        </table>
    </form>
</body>

</html>
