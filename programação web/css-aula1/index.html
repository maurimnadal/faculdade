<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Exemplo de CSS Inline</title>
</head>

<body>
    <h1 style="color: navy; font-size: 2em;">Título com Estilo Inline</h1>
    <p style="color: green; font-weight: bold;">Este parágrafo é estilizado
        diretamente no elemento.</p>
    <div style="padding: 20px; border: 1px solid black;">
        Esta div possui um padding e uma borda definidos inline.
    </div>
</body>
</html>
